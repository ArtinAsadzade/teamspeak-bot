version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: teamspeak-bot-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - appnet

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teamspeak-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3030
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3030:3030"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
